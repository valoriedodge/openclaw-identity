# 1. Listen on TCP port 24224 for incoming JSON payloads
<source>
  @type tcp
  port 24224
  bind 0.0.0.0
  tag openclaw.audit
  <parse>
    @type json
  </parse>
</source>

# 2. Write those payloads to the secure, air-gapped volume mount
<match openclaw.audit>
  @type file
  path /fluentd/log/audit.jsonl
  append true
  <buffer>
    @type file
    path /fluentd/log/buffer
    flush_mode interval
    flush_interval 5s
  </buffer>
</match>
